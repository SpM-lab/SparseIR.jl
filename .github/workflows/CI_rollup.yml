name: CI_rollup
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop_v2xx
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
permissions:
  checks: read
  contents: read
jobs:
  rollup:
    name: CI Rollup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const expected = [
              "CI / Julia lts / ubuntu-latest / x64",
              "CI / Julia 1 / ubuntu-latest / x64",
              "CI / Julia lts / macOS-latest / arm64",
              "CI / Julia 1 / macOS-latest / arm64",
              "CI / Documentation",
              "Latest Rust Backend / Julia lts / ubuntu-latest / x64",
              "Latest Rust Backend / Julia 1 / ubuntu-latest / x64",
              "Latest Rust Backend / Julia lts / macOS-latest / arm64",
              "Latest Rust Backend / Julia 1 / macOS-latest / arm64",
              "Latest Rust Backend / Documentation",
              "Pkg.add / Julia lts / ubuntu-latest / x64",
              "Pkg.add / Julia 1 / ubuntu-latest / x64",
              "Pkg.add / Julia lts / macOS-latest / arm64",
              "Pkg.add / Julia 1 / macOS-latest / arm64",
              "Spell Check with Typos",
            ];
            const ok = new Set(["success", "neutral", "skipped"]);
            const deadline = Date.now() + 60 * 60 * 1000;

            function latestRunsByName(checkRuns) {
              const byName = new Map();
              for (const run of checkRuns) {
                const previous = byName.get(run.name);
                if (!previous || run.id > previous.id) {
                  byName.set(run.name, run);
                }
              }
              return byName;
            }

            while (true) {
              const response = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.sha,
                per_page: 100,
              });
              const byName = latestRunsByName(response.data.check_runs);
              const missing = [];
              const pending = [];
              const failed = [];

              for (const name of expected) {
                const run = byName.get(name);
                if (!run) {
                  missing.push(name);
                  continue;
                }
                if (run.status !== "completed") {
                  pending.push(`${name} (${run.status})`);
                  continue;
                }
                if (!ok.has(run.conclusion)) {
                  failed.push(`${name} (${run.conclusion})`);
                }
              }

              if (failed.length > 0) {
                core.setFailed(`Required checks failed: ${failed.join(", ")}`);
                return;
              }

              if (missing.length === 0 && pending.length === 0) {
                core.info("All required checks passed.");
                return;
              }

              if (Date.now() > deadline) {
                core.setFailed(`Timed out waiting for checks. Missing: ${missing.join(", ")}. Pending: ${pending.join(", ")}`);
                return;
              }

              core.info(`Waiting for checks. Missing: ${missing.join(", ") || "none"}. Pending: ${pending.join(", ") || "none"}.`);
              await new Promise(resolve => setTimeout(resolve, 15000));
            }
